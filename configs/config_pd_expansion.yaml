# PD Expansion Experiment: 62 Scenarios × 5 Models × 100 trials = 31,000 trials
# Taxonomy axes: R (Relationship 1-5), S (Moral Stakes 1-5), C (Consensus 1-4)
# Quadrants: Q1=Adversarial+Low, Q2=Collab+Low, Q3=Adversarial+High, Q4=Collab+High

models:
  - id: claude-3.7-sonnet
    name: anthropic/claude-3.7-sonnet
    max_tokens: 500
  - id: gpt-5.2
    name: openai/gpt-5.2
    max_tokens: 500
  - id: deepseek-v3.2
    name: deepseek/deepseek-v3.2
    max_tokens: 500
  - id: claude-haiku-4.5
    name: anthropic/claude-haiku-4.5
    max_tokens: 500
  - id: o4-mini
    name: openai/o4-mini
    max_tokens: 500

experiments:
  prisoner_dilemma:
    enabled: true
    trials_per_condition: 100
    valid_choices: ["COOPERATE", "DEFECT"]
    group_sizes: [2]

    stake_levels:
      - id: standard
        multiplier: 1.0
        # Payoffs (hardcoded in runner): cc=100, dd=50, cd_defector=150, cd_sucker=0

    incentive_structures:
      - id: standard
        temptation_ratio: 1.5
        punishment_ratio: 0.5
        sucker_ratio: 0.0

    scenarios:
      # Q1: Adversarial + Low Stakes (14 scenarios, R≤2, S≤2)
